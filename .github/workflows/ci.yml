name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          
      - name: Download dependencies
        run: go mod download
        
      - name: Build
        run: go build -v ./...
        
      - name: Run tests
        run: go test -v ./...
